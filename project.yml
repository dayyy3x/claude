name: UltronVPN
options:
  bundleIdPrefix: com.davidwilliams.ultronvpn
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  WireGuardKit:
    url: https://git.zx2c4.com/wireguard-apple
    from: "1.0.15-26"

targets:
  UltronVPN:
    type: application
    platform: iOS
    sources:
      - path: UltronVPN
      - path: Shared
    resources:
      - path: UltronVPN/Resources/Assets.xcassets
    info:
      path: UltronVPN/Resources/Info.plist
      properties:
        CFBundleDisplayName: Ultron
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - voip
        NSCameraUsageDescription: Scan a WireGuard configuration QR code to import a tunnel.
        NSLocalNetworkUsageDescription: Ultron pings peers on your tunnel to show live latency.
        LSApplicationQueriesSchemes:
          - moonlight
          - rdp
          - vnc
        UIApplicationSupportsIndirectInputEvents: true
        UIUserInterfaceStyle: Dark
    entitlements:
      path: UltronVPN/Entitlements/UltronVPN.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - group.com.davidwilliams.ultronvpn
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.davidwilliams.ultronvpn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidwilliams.ultronvpn
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
    dependencies:
      - target: PacketTunnel
      - target: UltronWidget
      - package: WireGuardKit

  PacketTunnel:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnel
      - path: Shared
    info:
      path: PacketTunnel/Info.plist
      properties:
        CFBundleDisplayName: Ultron Tunnel
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PacketTunnelProvider
    entitlements:
      path: PacketTunnel/PacketTunnel.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - group.com.davidwilliams.ultronvpn
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.davidwilliams.ultronvpn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidwilliams.ultronvpn.tunnel
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - package: WireGuardKit

  UltronWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: UltronWidget
      - path: Shared
    resources:
      - path: UltronVPN/Resources/Assets.xcassets
    info:
      path: UltronWidget/Info.plist
      properties:
        CFBundleDisplayName: Ultron
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: UltronWidget/UltronWidget.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - packet-tunnel-provider
        com.apple.security.application-groups:
          - group.com.davidwilliams.ultronvpn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidwilliams.ultronvpn.widget
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
